<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FAF3E1"/>
  <rect width="1200" height="90" fill="#222222"/>
  <text x="60" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#FF6D1F">GARAGE CONVERSION</text>
  <text x="60" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#FAF3E1">What the Permit Set Must Cover for a Garage Conversion ADU</text>

  <!-- Left column header -->
  <text x="60" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2.5" fill="#FF6D1F">PERMIT DRAWING REQUIREMENTS</text>

  <!-- Left column: 6 requirements -->
  <!-- Item 1 -->
  <rect x="40" y="148" width="530" height="56" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <rect x="40" y="148" width="4" height="56" rx="2" fill="#FF6D1F"/>
  <text x="58" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">Structural Evaluation</text>
  <text x="58" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">Existing foundation, slab, roof framing — confirm capacity for habitable use</text>

  <!-- Item 2 -->
  <rect x="40" y="214" width="530" height="56" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <rect x="40" y="214" width="4" height="56" rx="2" fill="#FF6D1F"/>
  <text x="58" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">Egress Window or Door</text>
  <text x="58" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">Minimum opening size per IBC/IRC — required in every sleeping room</text>

  <!-- Item 3 -->
  <rect x="40" y="280" width="530" height="56" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <rect x="40" y="280" width="4" height="56" rx="2" fill="#FF6D1F"/>
  <text x="58" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">Insulation &amp; Thermal Envelope</text>
  <text x="58" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">Floor, wall, ceiling insulation to meet FL/TX/NC energy code minimums</text>

  <!-- Item 4 -->
  <rect x="40" y="346" width="530" height="56" rx="2" fill="#222222"/>
  <rect x="40" y="346" width="4" height="56" rx="2" fill="#FF6D1F"/>
  <text x="58" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FAF3E1">HVAC &amp; Ventilation</text>
  <text x="58" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.75">Mechanical drawings showing heating, cooling, and fresh air per code</text>

  <!-- Item 5 -->
  <rect x="40" y="412" width="530" height="56" rx="2" fill="#222222"/>
  <rect x="40" y="412" width="4" height="56" rx="2" fill="#FF6D1F"/>
  <text x="58" y="437" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FAF3E1">Electrical Layout</text>
  <text x="58" y="456" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.75">Outlets, lighting, smoke detectors, panel capacity — per NEC requirements</text>

  <!-- Vertical divider -->
  <line x1="620" y1="110" x2="620" y2="450" stroke="#E2D4B8" stroke-width="1"/>

  <!-- Right column header -->
  <text x="640" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2.5" fill="#FF6D1F">COMMON APPROVAL ISSUES</text>

  <!-- Issue 1 -->
  <rect x="630" y="148" width="530" height="70" rx="2" fill="#FF6D1F"/>
  <text x="648" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FAF3E1">Ceiling Height Below 7 ft</text>
  <text x="648" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">Most codes require 7 ft minimum in habitable rooms. Sloped garage</text>
  <text x="648" y="209" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">ceilings frequently fail this threshold — verify before design begins.</text>

  <!-- Issue 2 -->
  <rect x="630" y="228" width="530" height="70" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <text x="648" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">Missing Fire Separation</text>
  <text x="648" y="273" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">If attached to primary residence, a 1-hour fire separation wall between</text>
  <text x="648" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">garage and living space is required by IBC/IRC.</text>

  <!-- Issue 3 -->
  <rect x="630" y="308" width="530" height="70" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <text x="648" y="333" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">No Separate Address / Utilities</text>
  <text x="648" y="353" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">Many FL and NC jurisdictions require separate utility meters for ADU</text>
  <text x="648" y="369" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">rental units. Verify with jurisdiction before design.</text>

  <!-- Issue 4 -->
  <rect x="630" y="388" width="530" height="70" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <text x="648" y="413" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#222222">FL South Florida Wind Requirements</text>
  <text x="648" y="433" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">Miami-Dade HVHZ requires impact-resistant glazing documentation for</text>
  <text x="648" y="449" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">all new openings. Non-compliance is a first-pass rejection.</text>

  <!-- Footer -->
  <rect x="0" y="462" width="1200" height="168" fill="#F5E7C6"/>
  <rect x="0" y="462" width="1200" height="2" fill="#E2D4B8"/>
  <text x="60" y="512" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="300" fill="#7A6E5F">Garage conversions require a change-of-occupancy permit in every Florida, Texas, and North Carolina jurisdiction.</text>
  <text x="60" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="300" fill="#7A6E5F">A coordinated permit set addressing all six areas above is the single best way to clear plan check on first submission.</text>
  <text x="60" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" letter-spacing="1.5" fill="#FF6D1F">CADTRI.COM</text>
  <text x="1140" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="#7A6E5F" text-anchor="end">cadtri.com/resources/garage-conversion-adu-california</text>
</svg>
