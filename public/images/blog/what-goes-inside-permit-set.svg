<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FAF3E1"/>
  <rect width="1200" height="90" fill="#222222"/>
  <text x="60" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#FF6D1F">PERMIT DOCUMENTATION</text>
  <text x="60" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#FAF3E1">What Separates a Complete Permit Set from an Incomplete One</text>

  <!-- Left: Incomplete -->
  <rect x="40" y="110" width="490" height="330" rx="2" fill="#F5E7C6" stroke="#E2D4B8" stroke-width="1"/>
  <rect x="40" y="110" width="490" height="50" rx="2" fill="#E2D4B8"/>
  <text x="285" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" letter-spacing="-0.2" fill="#7A6E5F" text-anchor="middle">Incomplete Permit Set</text>

  <text x="60" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Generic drawings not coordinated to jurisdiction</text>
  <text x="60" y="213" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Architectural sheets don't match structural calcs</text>
  <text x="60" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Energy compliance form references wrong window specs</text>
  <text x="60" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Site plan setback dimensions don't match zoning code</text>
  <text x="60" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  No notes on code edition or amendment set</text>
  <text x="60" y="313" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Missing egress calculations or fire separation details</text>
  <text x="60" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#7A6E5F">✗  Plumbing fixture count not shown</text>

  <rect x="60" y="380" width="450" height="44" rx="2" fill="#E2D4B8"/>
  <text x="285" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7A6E5F" text-anchor="middle">Result: Plan check corrections, redesign cycles,</text>
  <text x="285" y="416" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7A6E5F" text-anchor="middle">permit delays and carrying costs</text>

  <!-- VS divider -->
  <rect x="545" y="245" width="70" height="40" rx="20" fill="#222222"/>
  <text x="580" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#FAF3E1" text-anchor="middle">VS</text>

  <!-- Right: Complete -->
  <rect x="630" y="110" width="530" height="330" rx="2" fill="#222222"/>
  <rect x="630" y="110" width="530" height="50" rx="2" fill="#FF6D1F"/>
  <text x="895" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" letter-spacing="-0.2" fill="#FAF3E1" text-anchor="middle">Complete CADTRI Permit Set</text>

  <text x="650" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Jurisdiction researched before first line is drawn</text>
  <text x="650" y="213" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  All disciplines coordinated — arch, structural, MEP</text>
  <text x="650" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Energy forms cross-referenced to drawing set</text>
  <text x="650" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Site plan verified against actual zoning dimensions</text>
  <text x="650" y="288" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Applicable code edition noted on every sheet</text>
  <text x="650" y="313" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Egress, fire separation, accessibility documented</text>
  <text x="650" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="300" fill="#FAF3E1" opacity="0.9">✓  Plumbing fixture schedule matches floor plan</text>

  <rect x="650" y="380" width="490" height="44" rx="2" fill="#FF6D1F"/>
  <text x="895" y="398" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF3E1" text-anchor="middle">Result: Faster plan check, fewer corrections,</text>
  <text x="895" y="416" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#FAF3E1" text-anchor="middle">permit approval on first or second submission</text>

  <!-- Footer -->
  <rect x="0" y="462" width="1200" height="168" fill="#F5E7C6"/>
  <rect x="0" y="462" width="1200" height="2" fill="#E2D4B8"/>
  <text x="60" y="512" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="300" fill="#7A6E5F">CADTRI researches each Florida, Texas, and North Carolina building department's specific submittal requirements before drafting begins.</text>
  <text x="60" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="300" fill="#7A6E5F">Every permit set is coordinated across all disciplines before submission — the single most effective way to clear plan check without corrections.</text>
  <text x="60" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" letter-spacing="1.5" fill="#FF6D1F">CADTRI.COM</text>
  <text x="1140" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="300" fill="#7A6E5F" text-anchor="end">cadtri.com/resources/what-is-a-permit-set</text>
</svg>
